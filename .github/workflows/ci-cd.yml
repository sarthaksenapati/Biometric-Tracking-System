name: CI/CD - Biometric Tracking System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.10'
  DOCKER_BUILDKIT: 1

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint and Test
  # ─────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python $
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black mypy

      - name: Lint with flake8
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length=120 .

      - name: Run tests
        run: |
          # Run custom test scripts
          python test.py
          python test_matcher.py || true
          python test_fusion.py || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.log
            test_*.py

  # ─────────────────────────────────────────────────────────
  # Job 2: Build Docker Images
  # ─────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tracker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.tracker
          push: false
          tags: biometric-tracker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: biometric-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          tags: biometric-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # Job 3: Deploy to Render (Backend & Dashboard)
  # Tracker runs locally (needs camera access)
  # ─────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Deploy Dashboard to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DASHBOARD }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Backend and Dashboard deployed to Render!"
          echo "📹 Tracker runs locally: python run_tracker_multi.py"

  # ─────────────────────────────────────────────────────────
  # Job 4: Create Release (Optional)
  # ─────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate-release-notes: true
          files: |
            requirements.txt
            docker-compose.yml
            Dockerfile.*

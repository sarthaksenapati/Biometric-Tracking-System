version: "3.8"

services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────────
  backend:
    build: .
    container_name: biometric-backend
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./embeddings_db:/app/embeddings_db
      - ./unknown_persons_emb:/app/unknown_persons_emb
      - ./datasets:/app/datasets
      - ./core:/app/core
      - ./models:/app/models
      - ./utils:/app/utils
      - ./backend:/app/backend
      - ./monitoring:/app/monitoring
    environment:
      - PYTHONPATH=/app
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    restart: unless-stopped
    networks:
      - biometric-net

  # ── Dashboard (Streamlit) ───────────────────────────────────────────────
  dashboard:
    build: .
    container_name: biometric-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./embeddings_db:/app/embeddings_db
      - ./unknown_persons_emb:/app/unknown_persons_emb
      - ./datasets:/app/datasets
      - ./core:/app/core
      - ./models:/app/models
      - ./utils:/app/utils
      - ./dashboard.py:/app/dashboard.py
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - biometric-net
    depends_on:
      - backend

  # ── Tracker (Single Camera) ─────────────────────────────────────────────
  tracker:
    build: .
    container_name: biometric-tracker
    command: python run_tracker.py
    volumes:
      - ./embeddings_db:/app/embeddings_db
      - ./unknown_persons_emb:/app/unknown_persons_emb
      - ./datasets:/app/datasets
      - ./core:/app/core
      - ./models:/app/models
      - ./utils:/app/utils
      - ./iot_stream:/app/iot_stream
      - ./run_tracker.py:/app/run_tracker.py
      - ./monitoring:/app/monitoring
    environment:
      - PYTHONPATH=/app
    network_mode: "host"  # For camera access
    restart: unless-stopped
    privileged: true  # For camera device access
    devices:
      - /dev/video0:/dev/video0  # Adjust for your camera device
    depends_on:
      - backend

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: biometric-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - biometric-net

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: biometric-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - biometric-net
    depends_on:
      - prometheus

networks:
  biometric-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

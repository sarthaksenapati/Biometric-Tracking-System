# render.yaml — Render Blueprint
#
# Provisions a managed Postgres database and a managed Redis instance, then
# wires their real connection strings into both services by reference. The old
# version hardcoded placeholder dashboard URLs (https://dashboard.render.com/…)
# as DATABASE_URL / REDIS_URL, which are not valid connection strings — the apps
# silently fell back to local .npy files and no cache. These references fix that.
#
# Secrets (API_KEY, DASHBOARD_ACCESS_CODE) use `sync: false`: Render prompts for
# them in the dashboard and never stores them in git.

databases:
  - name: biometric-db
    plan: free

services:
  # ── Managed Redis ───────────────────────────────────────────────────
  - type: redis
    name: biometric-redis
    plan: free
    ipAllowList: []          # internal only — reachable from Render services

  # ── Backend API (FastAPI) ───────────────────────────────────────────
  - type: web
    name: biometric-backend
    env: docker
    plan: free
    branch: main
    healthCheckPath: /
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL
        fromDatabase:
          name: biometric-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: biometric-redis
          property: connectionString
      - key: API_KEY            # protects /metrics, /alerts, /health/*
        sync: false

  # ── Dashboard (Streamlit) ───────────────────────────────────────────
  - type: web
    name: biometric-dashboard
    env: docker
    plan: free
    branch: main
    healthCheckPath: /_stcore/health
    dockerfilePath: ./Dockerfile.dashboard
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: BACKEND_URL
        value: https://biometric-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: biometric-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: biometric-redis
          property: connectionString
      - key: DASHBOARD_ACCESS_CODE   # gates the dashboard UI
        sync: false

services:
  # ── Backend API (FastAPI) ──────────────────────────────────────────
  - type: web
    name: biometric-backend
    env: docker
    plan: free
    branch: main
    healthCheckPath: /
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL
        value: https://dashboard.render.com/postgres
      - key: REDIS_URL
        value: https://dashboard.render.com/redis

  # ── Dashboard (Streamlit) ───────────────────────────────────────────
  - type: web
    name: biometric-dashboard
    env: docker
    plan: free
    branch: main
    healthCheckPath: /_stcore/health
    dockerfilePath: ./Dockerfile.dashboard
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: BACKEND_URL
        value: https://biometric-backend.onrender.com
      - key: DATABASE_URL
        value: https://dashboard.render.com/postgres
      - key: REDIS_URL
        value: https://dashboard.render.com/redis
